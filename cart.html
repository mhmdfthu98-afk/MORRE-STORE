<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MORRE STORE | سلة المشتريات</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #fef08a 0%, #fde047 30%, #fef9c3 60%, #fef08a 100%);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        .back-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            margin-bottom: 8px;
        }
        .back-header .back-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 8px 16px;
            color: #1e293b;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .back-header .back-btn:hover {
            background: rgba(255, 255, 255, 0.8);
        }
        .back-header .page-title {
            font-size: 1.3rem;
            font-weight: 900;
            color: #1e293b;
        }
        .glass-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #f1f5f9;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
        }
        .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            align-items: center;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .cart-item img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 10px;
            background: #f8fafc;
            padding: 4px;
            border: 1px solid #e2e8f0;
        }
        .cart-item .item-info {
            flex: 1;
        }
        .cart-item .item-info .item-name {
            font-weight: 700;
            color: #1e293b;
            font-size: 0.9rem;
        }
        .cart-item .item-info .item-category {
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .cart-item .item-info .item-price {
            font-weight: 900;
            color: #d97706;
            font-size: 0.85rem;
        }
        .cart-item .item-qty {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cart-item .item-qty button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-item .item-qty button:hover {
            border-color: #d97706;
            background: #fef3c7;
        }
        .cart-item .item-qty .qty-num {
            font-weight: 700;
            font-size: 0.9rem;
            min-width: 24px;
            text-align: center;
            color: #1e293b;
        }
        .cart-item .item-total {
            font-weight: 900;
            color: #d97706;
            font-size: 0.85rem;
            min-width: 70px;
            text-align: left;
        }
        .cart-item .item-remove {
            color: #dc2626;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
            background: none;
            border: none;
        }
        .cart-item .item-remove:hover {
            transform: scale(1.2);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.9rem;
        }
        .summary-row.total {
            font-weight: 900;
            font-size: 1.1rem;
            border-top: 2px solid #e2e8f0;
            margin-top: 4px;
            padding-top: 12px;
            color: #1e293b;
        }
        .summary-row .label {
            color: #64748b;
        }
        .summary-row .value {
            font-weight: 700;
        }
        .summary-row .value.price {
            color: #d97706;
        }
        .coupon-input {
            display: flex;
            gap: 8px;
        }
        .coupon-input input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.6);
            font-family: 'Cairo', sans-serif;
        }
        .coupon-input input:focus {
            outline: none;
            border-color: #f59e0b;
        }
        .coupon-input button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
            white-space: nowrap;
        }
        .coupon-input button:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }
        .cart-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .cart-actions .btn-action {
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
            text-align: center;
        }
        .cart-actions .btn-action.primary {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
        .cart-actions .btn-action.primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }
        .cart-actions .btn-action.outline {
            background: transparent;
            color: #1e293b;
            border: 2px solid #e2e8f0;
        }
        .cart-actions .btn-action.outline:hover {
            border-color: #d97706;
        }
        .cart-actions .btn-action.danger {
            background: #fee2e2;
            color: #dc2626;
        }
        .cart-actions .btn-action.danger:hover {
            background: #fecaca;
        }
        .cart-actions .btn-action.full {
            grid-column: 1 / -1;
        }
        .empty-cart {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }
        .empty-cart i {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 16px;
            display: block;
        }
        .empty-cart h3 {
            color: #1e293b;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .empty-cart .btn-shop {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 30px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            font-weight: 800;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.2s;
        }
        .empty-cart .btn-shop:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.3);
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 999999;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }
        .toast.success {
            background: #059669;
            color: white;
        }
        .toast.error {
            background: #dc2626;
            color: white;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 0 10px 0;
            z-index: 9999;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #94a3b8;
            font-size: 0.55rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 4px 12px;
            border-radius: 12px;
            text-decoration: none;
            border: none;
            background: transparent;
        }
        .bottom-nav .nav-item i {
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }
        .bottom-nav .nav-item span {
            font-size: 0.55rem;
            font-weight: 700;
        }
        .bottom-nav .nav-item.active {
            color: #d97706;
        }
        .bottom-nav .nav-item.active i {
            transform: translateY(-2px);
        }
        .bottom-nav .nav-item:hover {
            color: #d97706;
        }
        @media (max-width: 480px) {
            .bottom-nav .nav-item {
                padding: 4px 6px;
            }
            .bottom-nav .nav-item i {
                font-size: 1.1rem;
            }
            .bottom-nav .nav-item span {
                font-size: 0.45rem;
            }
            .cart-item {
                flex-wrap: wrap;
            }
            .cart-item .item-total {
                min-width: auto;
                margin-right: auto;
            }
            .cart-actions {
                grid-template-columns: 1fr;
            }
            .cart-actions .btn-action.full {
                grid-column: 1;
            }
        }
        .dark body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .dark .glass-card {
            background: #1e293b;
            border-color: #334155;
        }
        .dark .glass-card .card-title {
            color: #f1f5f9;
        }
        .dark .back-header .page-title {
            color: #f1f5f9;
        }
        .dark .back-header .back-btn {
            background: rgba(30, 41, 59, 0.6);
            color: #f1f5f9;
            border-color: #334155;
        }
        .dark .back-header .back-btn:hover {
            background: rgba(30, 41, 59, 0.8);
        }
        .dark .cart-item {
            border-color: #334155;
        }
        .dark .cart-item .item-info .item-name {
            color: #f1f5f9;
        }
        .dark .cart-item .item-info .item-price {
            color: #fbbf24;
        }
        .dark .cart-item .item-qty .qty-num {
            color: #f1f5f9;
        }
        .dark .cart-item .item-qty button {
            background: #0f172a;
            border-color: #334155;
            color: #f1f5f9;
        }
        .dark .cart-item .item-qty button:hover {
            border-color: #fbbf24;
            background: #1e293b;
        }
        .dark .cart-item .item-total {
            color: #fbbf24;
        }
        .dark .summary-row.total {
            border-color: #334155;
            color: #f1f5f9;
        }
        .dark .summary-row .value.price {
            color: #fbbf24;
        }
        .dark .coupon-input input {
            background: rgba(15, 23, 42, 0.6);
            border-color: #334155;
            color: #f1f5f9;
        }
        .dark .coupon-input input:focus {
            border-color: #fbbf24;
        }
        .dark .cart-actions .btn-action.outline {
            border-color: #334155;
            color: #f1f5f9;
        }
        .dark .cart-actions .btn-action.outline:hover {
            border-color: #fbbf24;
        }
        .dark .empty-state h3 {
            color: #f1f5f9;
        }
        .dark .empty-state i {
            color: #475569;
        }
        .dark .bottom-nav {
            background: rgba(30, 41, 59, 0.95);
            border-top-color: rgba(255, 255, 255, 0.05);
        }
        .dark .bottom-nav .nav-item {
            color: #64748b;
        }
        .dark .bottom-nav .nav-item.active {
            color: #fbbf24;
        }
        .dark .toast {
            background: #f1f5f9;
            color: #1e293b;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== رأس الصفحة ===== -->
        <div class="back-header">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-right"></i> رجوع
            </a>
            <div class="page-title">🛒 سلة المشتريات</div>
        </div>

        <!-- ===== قائمة المنتجات ===== -->
        <div id="cartItems" class="glass-card">
            <!-- سيتم عرض المنتجات هنا عبر JavaScript -->
        </div>

        <!-- ===== كود الخصم ===== -->
        <div class="glass-card" id="couponSection">
            <div class="card-title" style="font-size:1rem;font-weight:800;color:#1e293b;margin-bottom:12px;display:flex;align-items:center;gap:10px;">
                <i class="fas fa-ticket" style="color:#d97706;"></i> كود الخصم
            </div>
            <div class="coupon-input">
                <input type="text" id="couponCode" placeholder="أدخل كود الخصم">
                <button onclick="applyCoupon()">تطبيق</button>
            </div>
            <div id="couponMessage" style="margin-top:8px;font-size:0.8rem;font-weight:600;"></div>
        </div>

        <!-- ===== ملخص الطلب ===== -->
        <div class="glass-card" id="orderSummary">
            <div class="card-title" style="font-size:1rem;font-weight:800;color:#1e293b;margin-bottom:12px;display:flex;align-items:center;gap:10px;">
                <i class="fas fa-calculator" style="color:#d97706;"></i> ملخص الطلب
            </div>
            <div id="summaryContent">
                <div class="summary-row">
                    <span class="label">📦 عدد المنتجات</span>
                    <span class="value" id="totalItems">0</span>
                </div>
                <div class="summary-row">
                    <span class="label">💰 إجمالي السعر</span>
                    <span class="value price" id="subtotal">0 ج.س</span>
                </div>
                <div class="summary-row" id="discountRow" style="display:none;">
                    <span class="label">🏷️ الخصم</span>
                    <span class="value price" id="discountAmount" style="color:#059669;">-0 ج.س</span>
                </div>
                <div class="summary-row" id="feeRow" style="display:none;">
                    <span class="label">📋 رسوم التوصيل</span>
                    <span class="value price" id="feeAmount">0 ج.س</span>
                </div>
                <div class="summary-row total">
                    <span class="label">💳 المبلغ النهائي</span>
                    <span class="value price" id="totalPrice">0 ج.س</span>
                </div>
            </div>
        </div>

        <!-- ===== أزرار الإجراءات ===== -->
        <div class="cart-actions">
            <button class="btn-action outline" onclick="window.location.href='index.html'">
                <i class="fas fa-store ml-1"></i> متابعة التسوق
            </button>
            <button class="btn-action danger" onclick="clearCart()">
                <i class="fas fa-trash ml-1"></i> إفراغ السلة
            </button>
            <button class="btn-action primary full" onclick="checkout()">
                <i class="fas fa-check-circle ml-1"></i> إتمام الطلب
            </button>
        </div>

    </div>

    <!-- ===== الشريط السفلي ===== -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
        <a href="cart.html" class="nav-item active">
            <i class="fas fa-shopping-cart"></i>
            <span>السلة</span>
        </a>
        <a href="orders.html" class="nav-item">
            <i class="fas fa-box"></i>
            <span>طلباتي</span>
        </a>
        <a href="account.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>الحساب</span>
        </a>
    </div>

    <!-- ===== Toast ===== -->
    <div id="toast" class="toast"></div>

    <script>
        // ========== بيانات السلة ==========
        let cart = [];
        let appliedCoupon = null;
        const COUPONS = {
            'MORRE10': { discount: 10, type: 'percentage' },
            'MORRE25': { discount: 25, type: 'percentage' },
            'SAVE50': { discount: 50, type: 'fixed' },
            'FREESHIP': { discount: 0, type: 'free_shipping' }
        };

        // ========== صور الفئات ==========
        const categoryImages = {
            pubg: 'https://i.postimg.cc/SN4TQSGQ/file-000000000ae07243bf080d232a76158e.png',
            freefire: 'https://i.postimg.cc/x8DsznDp/file-0000000095d871f4a98ae4b5e7f7563e.png',
            clash: 'https://i.postimg.cc/MpdrrCRh/file-0000000019f87246a34879d95dafc72f.png',
            efootball: 'https://i.postimg.cc/wBRccZkL/file-000000005ce47246b4bbf4d41780d381.png',
            netflix: 'https://i.postimg.cc/KzLfFwkT/file-00000000a72471f4a83694b4182dcb9a.png',
            googleplay: 'https://i.postimg.cc/fWcCP4Qr/file-00000000ad487243bcd48c5b955d8fb6.png',
            redotpay: 'https://i.postimg.cc/8CX9s2z9/file-000000005a4071f49c1a71cba81c7f07.png',
            tiktok: 'https://i.postimg.cc/ryRXRwW8/file-000000003b7471f4a1bff18c344d7df3.png',
            ai: 'https://i.postimg.cc/HsWwPV2p/file-0000000088c872469e0e816aeeacf79f.png',
            fcmobile: 'https://i.postimg.cc/W3nDMwxn/file-00000000115871f4b4da53b76bf17dba.png',
            clashroyale: 'https://i.postimg.cc/NFKg58tH/file-00000000f02c71f484a929bd216e03fe.png',
            canva: 'https://i.postimg.cc/bwczw2Bz/file-00000000e2ec71f4a8288cc59567b21c.png',
            tod: 'https://i.postimg.cc/QxJDkgkg/file-00000000373071f4a3c74cba8713a3c9.png',
            mastercard: 'https://i.postimg.cc/h4Zvcvnj/file-00000000b79871f4950e84a15754235b.png',
            playstation: 'https://i.postimg.cc/3xvdLTPK/file-00000000ffb071f4841c7a113b560c90.png',
            spotify: 'https://i.postimg.cc/QxJDkgkg/file-00000000373071f4a3c74cba8713a3c9.png'
        };

        const defaultImage = 'https://via.placeholder.com/200?text=No+Image';

        // ========== تحميل السلة من localStorage ==========
        function loadCart() {
            try {
                const saved = localStorage.getItem('morre_cart');
                if (saved) {
                    cart = JSON.parse(saved);
                    // التحقق من صحة البيانات
                    if (!Array.isArray(cart)) cart = [];
                }
            } catch (e) {
                cart = [];
            }
            renderCart();
        }

        // ========== حفظ السلة ==========
        function saveCart() {
            localStorage.setItem('morre_cart', JSON.stringify(cart));
        }

        // ========== إضافة منتج للسلة ==========
        function addToCart(product) {
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    category: product.category || 'games',
                    image: product.image || categoryImages[product.category] || defaultImage,
                    quantity: 1
                });
            }
            saveCart();
            showToast('✅ تم إضافة المنتج إلى السلة', 'success');
            renderCart();
        }

        // ========== عرض السلة ==========
        function renderCart() {
            const container = document.getElementById('cartItems');

            if (cart.length === 0) {
                container.innerHTML = `
                            <div class="empty-cart">
                                <i class="fas fa-shopping-cart"></i>
                                <h3>🛒 سلة المشتريات فارغة</h3>
                                <p style="color:#64748b;font-size:0.9rem;">أضف بعض المنتجات للبدء في التسوق</p>
                                <a href="index.html" class="btn-shop">🛍️ الذهاب إلى المتجر</a>
                            </div>
                        `;
                document.getElementById('couponSection').style.display = 'none';
                document.getElementById('orderSummary').style.display = 'none';
                document.querySelector('.cart-actions').style.display = 'none';
                return;
            }

            document.getElementById('couponSection').style.display = 'block';
            document.getElementById('orderSummary').style.display = 'block';
            document.querySelector('.cart-actions').style.display = 'grid';

            let html = '';
            cart.forEach((item, index) => {
                const total = item.price * item.quantity;
                html += `
                            <div class="cart-item" data-index="${index}">
                                <img src="${item.image || defaultImage}" alt="${item.name}" loading="lazy">
                                <div class="item-info">
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-category">📂 ${item.category || 'غير محدد'}</div>
                                    <div class="item-price">${item.price.toLocaleString()} ج.س</div>
                                </div>
                                <div class="item-qty">
                                    <button onclick="updateQuantity(${index}, -1)">−</button>
                                    <span class="qty-num">${item.quantity}</span>
                                    <button onclick="updateQuantity(${index}, 1)">+</button>
                                </div>
                                <div class="item-total">${total.toLocaleString()} ج.س</div>
                                <button class="item-remove" onclick="removeItem(${index})">
                                    <i class="fas fa-times-circle"></i>
                                </button>
                            </div>
                        `;
            });

            container.innerHTML = html;
            updateSummary();
        }

        // ========== تحديث الكمية ==========
        function updateQuantity(index, change) {
            if (cart[index]) {
                cart[index].quantity += change;
                if (cart[index].quantity <= 0) {
                    cart.splice(index, 1);
                }
                saveCart();
                renderCart();
                showToast('🔄 تم تحديث الكمية', 'info');
            }
        }

        // ========== حذف منتج ==========
        function removeItem(index) {
            if (confirm('⚠️ هل أنت متأكد من حذف هذا المنتج من السلة؟')) {
                cart.splice(index, 1);
                saveCart();
                renderCart();
                showToast('🗑️ تم حذف المنتج', 'info');
            }
        }

        // ========== إفراغ السلة ==========
        function clearCart() {
            if (cart.length === 0) {
                showToast('📭 السلة فارغة بالفعل', 'info');
                return;
            }
            if (confirm('⚠️ هل أنت متأكد من إفراغ السلة بالكامل؟')) {
                cart = [];
                appliedCoupon = null;
                document.getElementById('couponCode').value = '';
                document.getElementById('couponMessage').textContent = '';
                saveCart();
                renderCart();
                showToast('🗑️ تم إفراغ السلة', 'info');
            }
        }

        // ========== تحديث الملخص ==========
        function updateSummary() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);

            let discount = 0;
            let fee = 0;

            if (appliedCoupon) {
                const coupon = COUPONS[appliedCoupon];
                if (coupon) {
                    if (coupon.type === 'percentage') {
                        discount = (subtotal * coupon.discount) / 100;
                    } else if (coupon.type === 'fixed') {
                        discount = coupon.discount;
                    } else if (coupon.type === 'free_shipping') {
                        fee = 0;
                    }
                }
            }

            // رسوم التوصيل (افتراضية)
            if (subtotal > 0 && subtotal < 50000) {
                fee = 1000;
            } else if (subtotal >= 50000) {
                fee = 0;
            }

            const total = subtotal - discount + fee;

            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('subtotal').textContent = subtotal.toLocaleString() + ' ج.س';

            if (discount > 0) {
                document.getElementById('discountRow').style.display = 'flex';
                document.getElementById('discountAmount').textContent = '-' + discount.toLocaleString() + ' ج.س';
            } else {
                document.getElementById('discountRow').style.display = 'none';
            }

            if (fee > 0) {
                document.getElementById('feeRow').style.display = 'flex';
                document.getElementById('feeAmount').textContent = fee.toLocaleString() + ' ج.س';
            } else {
                document.getElementById('feeRow').style.display = 'none';
            }

            document.getElementById('totalPrice').textContent = total.toLocaleString() + ' ج.س';
        }

        // ========== تطبيق كود الخصم ==========
        function applyCoupon() {
            const code = document.getElementById('couponCode').value.trim().toUpperCase();
            const messageEl = document.getElementById('couponMessage');

            if (!code) {
                messageEl.textContent = '❌ الرجاء إدخال كود الخصم';
                messageEl.style.color = '#dc2626';
                return;
            }

            if (COUPONS[code]) {
                if (appliedCoupon === code) {
                    messageEl.textContent = 'ℹ️ هذا الكود مفعل بالفعل';
                    messageEl.style.color = '#d97706';
                    return;
                }
                appliedCoupon = code;
                messageEl.textContent = '✅ تم تطبيق كود الخصم بنجاح!';
                messageEl.style.color = '#059669';
                showToast('🎉 تم تطبيق الخصم بنجاح!', 'success');
                updateSummary();
            } else {
                messageEl.textContent = '❌ كود الخصم غير صحيح';
                messageEl.style.color = '#dc2626';
                showToast('❌ كود الخصم غير صحيح', 'error');
            }
        }

        // ========== إتمام الطلب ==========
        function checkout() {
            if (cart.length === 0) {
                showToast('❌ السلة فارغة! أضف منتجات أولاً', 'error');
                return;
            }

            const total = document.getElementById('totalPrice').textContent;
            if (confirm(`🛒 هل أنت متأكد من إتمام الطلب بقيمة ${total}؟`)) {
                // هنا يمكن إرسال الطلب إلى Firebase
                showToast('✅ تم إتمام الطلب بنجاح! سيتم التواصل معك قريباً', 'success');
                // تفريغ السلة بعد الطلب
                cart = [];
                appliedCoupon = null;
                document.getElementById('couponCode').value = '';
                document.getElementById('couponMessage').textContent = '';
                saveCart();
                renderCart();
            }
        }

        // ========== Toast ==========
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast';
            if (type === 'success') toast.classList.add('success');
            else if (type === 'error') toast.classList.add('error');
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ========== تحميل الصفحة ==========
        loadCart();

        // ========== الوضع الليلي ==========
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }

        console.log('🛒 MORRE STORE - Cart Page Loaded');
    </script>

</body>
</html>
