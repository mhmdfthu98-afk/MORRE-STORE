<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MORRE STORE | سلة المشتريات</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ... نفس الأنماط السابقة ... */
    </style>
</head>
<body>
    <div class="container">
        <div class="back-header">
            <a href="/" class="back-btn"><i class="fas fa-arrow-right"></i> رجوع</a>
            <div class="page-title">🛒 سلة المشتريات</div>
            <div class="cart-count" id="cartCount">0</div>
        </div>
        <div id="cartContent"></div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        // ========== السلة تعتمد على LocalStorage فقط ==========
        let cartItems = [];
        let couponApplied = false;
        let currentUser = null;

        // جلب المستخدم من localStorage
        try {
            const userStr = localStorage.getItem('userData');
            if (userStr) {
                currentUser = JSON.parse(userStr);
            }
        } catch(e) {}

        // ========== صور المنتجات ==========
        const productImages = {
            '325 شدة': 'https://i.ibb.co/20tqyP6s/4ff592f1-0de2-421f-bd99-514dd525d512.png',
            '60 شدة': 'https://i.ibb.co/20tqyP6s/4ff592f1-0de2-421f-bd99-514dd525d512.png',
            '1800 شدة': 'https://i.ibb.co/20tqyP6s/4ff592f1-0de2-421f-bd99-514dd525d512.png',
            '660 شدة': 'https://i.ibb.co/20tqyP6s/4ff592f1-0de2-421f-bd99-514dd525d512.png',
            '8100 شدة': 'https://i.ibb.co/20tqyP6s/4ff592f1-0de2-421f-bd99-514dd525d512.png',
            '3850 شدة': 'https://i.ibb.co/20tqyP6s/4ff592f1-0de2-421f-bd99-514dd525d512.png',
            '110 جوهرة': 'https://i.ibb.co/LMh98T2/4bf2c240-db85-47c5-b211-3d0a5cf192df.png',
            '231 جوهرة': 'https://i.ibb.co/LMh98T2/4bf2c240-db85-47c5-b211-3d0a5cf192df.png',
            '583 جوهرة': 'https://i.ibb.co/LMh98T2/4bf2c240-db85-47c5-b211-3d0a5cf192df.png',
            '1180 جوهرة': 'https://i.ibb.co/LMh98T2/4bf2c240-db85-47c5-b211-3d0a5cf192df.png',
            'التذكرة الذهبية': 'https://i.ibb.co/ZpS1L23Z/71ce3435-2342-43ff-aad3-0f65c7e6e837.png',
            '130 كوينز': 'https://i.ibb.co/RkCSn7yX/a7934c4c-ed36-4662-b9cc-7bc04c57abf3.png',
            '300 كوينز': 'https://i.ibb.co/RkCSn7yX/a7934c4c-ed36-4662-b9cc-7bc04c57abf3.png',
            '550 كوينز': 'https://i.ibb.co/RkCSn7yX/a7934c4c-ed36-4662-b9cc-7bc04c57abf3.png',
            '750 كوينز': 'https://i.ibb.co/RkCSn7yX/a7934c4c-ed36-4662-b9cc-7bc04c57abf3.png',
            'نتفليكس Standard': 'https://i.ibb.co/HTqk43z8/4054fb24-7c84-445b-b62e-c15d5ed4fe8b.png',
            'بطاقة جوجل بلاي 5$': 'https://i.ibb.co/LhNr3W7Y/f0bf22d7-2b70-419a-8c74-898d8a251e56.png',
            'بطاقة جوجل بلاي 10$': 'https://i.ibb.co/LhNr3W7Y/f0bf22d7-2b70-419a-8c74-898d8a251e56.png',
            'حساب Redotpay موثق': 'https://i.ibb.co/ksqdJcgH/e96c9669-6446-4942-b760-a507d492a2b8.png',
            '114 عملة تيك توك': 'https://i.ibb.co/j93NWK9T/f74413af-29eb-4da4-917d-e347c7698ed7.png',
            '447 عملة تيك توك': 'https://i.ibb.co/j93NWK9T/f74413af-29eb-4da4-917d-e347c7698ed7.png',
            '897 عملة تيك توك': 'https://i.ibb.co/j93NWK9T/f74413af-29eb-4da4-917d-e347c7698ed7.png',
            'ChatGPT Plus - شهر': 'https://i.ibb.co/zVDbcgnW/c8f040a9-48ad-4e5e-8203-f941fbf94ad6.png',
            'ChatGPT Go - شهر': 'https://i.ibb.co/zVDbcgnW/c8f040a9-48ad-4e5e-8203-f941fbf94ad6.png',
            'Gemini Pro - شهر': 'https://i.ibb.co/zVDbcgnW/c8f040a9-48ad-4e5e-8203-f941fbf94ad6.png'
        };

        function getProductImage(name) {
            return productImages[name] || 'https://i.ibb.co/placeholder.png';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ========== جلب السلة ==========
        function loadCart() {
            if (!currentUser) {
                document.getElementById('cartContent').innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-user-lock"></i>
                        <p>🔒 يرجى تسجيل الدخول لعرض سلة المشتريات</p>
                        <a href="/" class="shop-btn">🔑 تسجيل الدخول</a>
                    </div>
                `;
                return;
            }

            const cartKey = 'cart_' + currentUser.uid;
            const localCart = localStorage.getItem(cartKey);
            if (localCart) {
                try {
                    cartItems = JSON.parse(localCart);
                } catch(e) {
                    cartItems = [];
                }
            } else {
                cartItems = [];
            }
            renderCart();
        }

        // ========== حفظ السلة ==========
        function saveCart() {
            if (!currentUser) return;
            const cartKey = 'cart_' + currentUser.uid;
            localStorage.setItem(cartKey, JSON.stringify(cartItems));
            renderCart();
        }

        // ========== عرض السلة ==========
        function renderCart() {
            const container = document.getElementById('cartContent');
            const countEl = document.getElementById('cartCount');

            const totalItems = cartItems.reduce((sum, item) => sum + (item.qty || 0), 0);
            countEl.textContent = totalItems;

            if (cartItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart"></i>
                        <p>🛒 سلة المشتريات فارغة</p>
                        <p style="font-size:0.8rem;color:#94a3b8;margin-top:4px;">أضف بعض المنتجات ثم عد لإتمام طلبك</p>
                        <a href="/" class="shop-btn">🛍️ العودة للتسوق</a>
                    </div>
                `;
                return;
            }

            let itemsHtml = '';
            let subtotal = 0;

            cartItems.forEach((item, index) => {
                const itemTotal = (item.price || 0) * (item.qty || 0);
                subtotal += itemTotal;
                const img = getProductImage(item.name);

                itemsHtml += `
                    <div class="cart-item" data-index="${index}">
                        <img src="${img}" alt="${item.name}" class="item-img" loading="lazy" onerror="this.src='https://i.ibb.co/placeholder.png'">
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">${(item.price || 0).toLocaleString()} ج.س</div>
                            <div class="item-total">الإجمالي: ${itemTotal.toLocaleString()} ج.س</div>
                        </div>
                        <div class="item-actions">
                            <button class="qty-btn" onclick="updateQty(${index}, -1)">−</button>
                            <span class="qty-num">${item.qty || 0}</span>
                            <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                            <button class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });

            const discountAmount = couponApplied ? subtotal * 0.1 : 0;
            const finalTotal = subtotal - discountAmount;

            container.innerHTML = `
                <div id="cartItemsList">${itemsHtml}</div>
                <div class="cart-summary">
                    <div class="summary-row"><span>المجموع الفرعي</span><span id="subtotal">${subtotal.toLocaleString()} ج.س</span></div>
                    <div class="summary-row"><span>الخصم</span><span id="discountAmount">-${discountAmount.toLocaleString()} ج.س</span></div>
                    <div class="summary-row total"><span>الإجمالي النهائي</span><span id="finalTotal">${finalTotal.toLocaleString()} ج.س</span></div>
                    
                    <div class="coupon-row">
                        <input type="text" id="couponInput" placeholder="🎁 كود الخصم">
                        <button onclick="applyCoupon()">تطبيق</button>
                    </div>

                    <div class="payment-method">
                        <select id="paymentMethod">
                            <option value="wallet">💰 المحفظة</option>
                            <option value="bank">🏦 بنك الخرطوم</option>
                            <option value="fawry">📱 فوري</option>
                        </select>
                    </div>

                    <button class="checkout-btn" onclick="checkout()">🛒 إتمام الطلب</button>
                    <button class="clear-all-btn" onclick="clearAll()">🗑️ حذف جميع المنتجات</button>
                </div>
            `;
        }

        // ========== دوال التحكم ==========
        window.updateQty = function(index, delta) {
            const newQty = (cartItems[index].qty || 0) + delta;
            if (newQty <= 0) {
                cartItems.splice(index, 1);
            } else {
                cartItems[index].qty = newQty;
            }
            saveCart();
        };

        window.removeItem = function(index) {
            cartItems.splice(index, 1);
            saveCart();
            showToast('🗑️ تم حذف المنتج');
        };

        window.clearAll = function() {
            if (confirm('⚠️ هل أنت متأكد من حذف جميع المنتجات من السلة؟')) {
                cartItems = [];
                saveCart();
                showToast('🗑️ تم حذف جميع المنتجات');
            }
        };

        window.applyCoupon = function() {
            const input = document.getElementById('couponInput');
            const code = input.value.trim().toUpperCase();
            if (code === 'MORRE20' || code === 'FREEFIRE10') {
                couponApplied = true;
                showToast('✅ تم تطبيق كود الخصم بنجاح!');
                renderCart();
            } else {
                showToast('❌ كود خصم غير صحيح');
            }
            input.value = '';
        };

        window.checkout = function() {
            if (!currentUser) {
                showToast('❌ يرجى تسجيل الدخول أولاً');
                return;
            }
            if (cartItems.length === 0) {
                showToast('❌ السلة فارغة');
                return;
            }
            const subtotal = cartItems.reduce((sum, item) => sum + (item.price || 0) * (item.qty || 0), 0);
            const discountAmount = couponApplied ? subtotal * 0.1 : 0;
            const finalTotal = subtotal - discountAmount;
            showToast(`✅ جاري إتمام الطلب بالمبلغ: ${finalTotal.toLocaleString()} ج.س`);
        };

        // ========== تحميل السلة ==========
        loadCart();

        window.updateQty = window.updateQty;
        window.removeItem = window.removeItem;
        window.clearAll = window.clearAll;
        window.applyCoupon = window.applyCoupon;
        window.checkout = window.checkout;
    </script>
</body>
</html>
