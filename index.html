        // ============================================================
        // TOAST NOTIFICATIONS
        // ============================================================
        function showToast(message, type = 'success') {
            const container = $('toastContainer');
            if (!container) return;
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            
            requestAnimationFrame(() => toast.classList.add('show'));
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // تسجيل الدخول بالبريد وكلمة المرور
        async function handleLogin() {
            const email = $('loginEmail').value.trim();
            const password = $('loginPassword').value.trim();
            
            if (!email || !password) {
                showToast('❌ الرجاء إدخال البريد الإلكتروني وكلمة المرور', 'error');
                return;
            }
            
            try {
                loadingScreen.classList.remove('hidden');
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                
                // التحقق من الحظر
                const userDoc = await getDoc(doc(db, "users", userCred.user.uid));
                if (userDoc.exists() && userDoc.data().isBlocked) {
                    await signOut(auth);
                    showToast('⛔ تم حظر حسابك، تواصل مع الدعم', 'error');
                    loadingScreen.classList.add('hidden');
                    return;
                }
                
                showToast('✅ مرحباً بك!', 'success');
                loadingScreen.classList.add('hidden');
            } catch (e) {
                loadingScreen.classList.add('hidden');
                if (e.code === 'auth/user-not-found') {
                    showToast('❌ البريد الإلكتروني غير مسجل', 'error');
                } else if (e.code === 'auth/wrong-password') {
                    showToast('❌ كلمة المرور غير صحيحة', 'error');
                } else {
                    showToast('❌ حدث خطأ: ' + e.message, 'error');
                }
            }
        }

        // إنشاء حساب جديد
        async function handleRegister() {
            const name = $('regName').value.trim();
            const email = $('regEmail').value.trim();
            const password = $('regPassword').value;
            const confirm = $('regConfirmPassword').value;
            const agree = $('agreeTerms').checked;
            
            if (!name || !email || !password || !confirm) {
                showToast('❌ جميع الحقول مطلوبة', 'error');
                return;
            }
            
            if (password.length < 6) {
                showToast('❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }
            
            if (password !== confirm) {
                showToast('❌ كلمة المرور غير متطابقة مع التأكيد', 'error');
                return;
            }
            
            if (!agree) {
                showToast('❌ وافق على الشروط والأحكام أولاً', 'error');
                return;
            }
            
            try {
                loadingScreen.classList.remove('hidden');
                
                // إنشاء المستخدم
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCred.user;
                
                // تحديث الاسم
                await updateProfile(user, { displayName: name });
                
                // إنشاء محفظة للمستخدم
                const walletID = Math.floor(100000 + Math.random() * 900000).toString();
                await setDoc(doc(db, "users", user.uid), {
                    name: name,
                    email: email,
                    img: 'https://via.placeholder.com/100',
                    walletID: walletID,
                    balance: 0,
                    provider: 'password',
                    emailVerified: user.emailVerified || false,
                    createdAt: serverTimestamp(),
                    phone: '',
                    paymentMethod: 'cash',
                    isBlocked: false,
                    notifyEmail: true,
                    notifyWhatsApp: true,
                    notifyPush: true
                });
                
                // إنشاء سجل المحفظة
                await setDoc(doc(db, "wallets", walletID), {
                    userId: user.uid,
                    walletID: walletID,
                    balance: 0,
                    reservedBalance: 0,
                    status: 'active',
                    createdAt: serverTimestamp(),
                    transactions: []
                });
                
                showToast(`✅ مرحباً بك ${name}!\nرقم محفظتك: #${walletID}`, 'success');
                loadingScreen.classList.add('hidden');
                
            } catch (e) {
                loadingScreen.classList.add('hidden');
                if (e.code === 'auth/email-already-in-use') {
                    showToast('❌ البريد الإلكتروني مستخدم بالفعل', 'error');
                } else {
                    showToast('❌ حدث خطأ: ' + e.message, 'error');
                }

        // شحن المحفظة
        async function rechargeWallet() {
            if (!userData) {
                showToast('❌ يرجى تسجيل الدخول أولاً', 'error');
                showAuthScreen();
                return;
            }
            
            const amount = prompt(`💰 أدخل المبلغ المراد شحنه\n\nالرصيد الحالي: ${(userData.balance || 0).toLocaleString()} ج.س\nرقم المحفظة: ${userData.walletID}`);
            if (!amount) return;
            
            const numAmount = parseInt(amount);
            if (isNaN(numAmount) || numAmount <= 0) {
                showToast('❌ مبلغ غير صحيح', 'error');
                return;
            }
            
            if (confirm(`💰 تأكيد شحن الرصيد\n\nالمبلغ: ${numAmount.toLocaleString()} ج.س\nطريقة الدفع: وكيل معتمد\n\nسيتم توجيهك إلى واتساب لإتمام العملية`)) {
                const message = `مرحباً، أريد شحن محفظتي\nرقم المحفظة: ${userData.walletID}\nالمبلغ: ${numAmount.toLocaleString()} ج.س`;
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
            }
        }

        // ============================================================
        // CART FUNCTIONS
        // ============================================================
        
        function addToCart(productId) {
            const product = getProductById(productId);
            if (!product) {
                showToast('❌ المنتج غير موجود', 'error');
                return;
            }
            
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ id: productId, quantity: 1 });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            showToast(`✅ تم إضافة ${product.name} إلى السلة`);
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            showCart();
        }

        function updateCartBadge() {
            const badge = $('cartBadge');
            if (badge) {
                const total = cart.reduce((sum, item) => sum + item.quantity, 0);
                badge.textContent = total;
            }
        }

        function showCart() {
            const modal = $('cartModal');
            const content = $('cartContent');
            
            if (cart.length === 0) {
                content.innerHTML = `
                    <p style="text-align:center;color:var(--gray-500);padding:1rem;">
                        <i class="fas fa-shopping-bag" style="display:block;font-size:2rem;margin-bottom:0.5rem;"></i>
                        السلة فارغة
                    </p>
                `;
            } else {
                let total = 0;
                content.innerHTML = cart.map(item => {
                    const product = getProductById(item.id);
                    if (!product) return '';
                    total += product.price * item.quantity;
                    return `
                        <div style="display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid var(--gray-200);">
                            <div>
                                <div style="font-weight:600;">${product.name}</div>
                                <div style="color:var(--gray-500);font-size:0.85rem;">${product.price.toLocaleString()} ج.س × ${item.quantity}</div>
                            </div>
                            <div style="display:flex;align-items:center;gap:0.5rem;">
                                <button onclick="updateCartQuantity('${item.id}', -1)" style="width:30px;height:30px;border-radius:50%;border:1px solid var(--gray-300);background:transparent;cursor:pointer;">-</button>
                                <span style="min-width:30px;text-align:center;font-weight:600;">${item.quantity}</span>
                                <button onclick="updateCartQuantity('${item.id}', 1)" style="width:30px;height:30px;border-radius:50%;border:1px solid var(--gray-300);background:transparent;cursor:pointer;">+</button>
                                <button onclick="removeFromCart('${item.id}')" style="background:none;border:none;color:#ef4444;cursor:pointer;padding:0.25rem 0.5rem;">🗑️</button>
                            </div>
                        </div>
                    `;
                }).join('');
                
                content.innerHTML += `
                    <div style="padding:1rem 0;margin-top:0.5rem;border-top:2px solid var(--gray-200);">
                        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.2rem;">
                            <span>الإجمالي:</span>
                            <span style="color:var(--primary);">${total.toLocaleString()} ج.س</span>

                            <i class="fas fa-credit-card"></i> إتمام الشراء
                        </button>
                    </div>
                `;
            }
            
            modal.classList.add('active');
        }

        function closeCart() {
            $('cartModal').classList.remove('active');
        }

        function updateCartQuantity(productId, change) {
            const item = cart.find(i => i.id === productId);
            if (!item) return;
            
            item.quantity += change;
            if (item.quantity <= 0) {
                cart = cart.filter(i => i.id !== productId);
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            showCart();
        }

        // ============================================================
        // CHECKOUT - حقيقي مع Firebase
        // ============================================================
        
        async function checkout() {
            if (cart.length === 0) {
                showToast('❌ السلة فارغة', 'error');
                return;
            }
            
            if (!userData) {
                showToast('❌ يرجى تسجيل الدخول أولاً', 'error');
                showAuthScreen();
                return;
            }
            
            // حساب الإجمالي
            let total = cart.reduce((sum, item) => {
                const product = getProductById(item.id);
                return sum + (product ? product.price * item.quantity : 0);
            }, 0);
            
            if (userData.balance < total) {
                showToast(`❌ رصيدك غير كافي! الرصيد: ${(userData.balance || 0).toLocaleString()} ج.س`, 'error');
                return;
            }
            
            if (!confirm(`💰 تأكيد الشراء\n\nالإجمالي: ${total.toLocaleString()} ج.س\nالرصيد: ${(userData.balance || 0).toLocaleString()} ج.س`)) {
                return;
            }
            
            try {
                loadingScreen.classList.remove('hidden');
                
                // تنفيذ المعاملة
                await runTransaction(db, async (transaction) => {
                    const userRef = doc(db, "users", auth.currentUser.uid);
                    const userSnap = await transaction.get(userRef);
                    
                    if (userSnap.data().balance < total) {
                        throw new Error("رصيد غير كاف");
                    }
                    
                    transaction.update(userRef, { balance: increment(-total) });
                    
                    // إنشاء طلب لكل منتج
                    for (const item of cart) {
                        const product = getProductById(item.id);
                        if (!product) continue;
                        
                        const orderData = {
                            uID: auth.currentUser.uid,
                            uName: userData.name,
                            product: product.name,
                            price: product.price * item.quantity,
                            game: product.category,
                            gameID: 'سلة التسوق',
                            gameName: 'سلة التسوق',
                            realName: userData.name,
                            whatsapp: userData.phone || 'غير محدد',
                            status: 'قيد الانتظار',
                            isCartOrder: true,
                            quantity: item.quantity,
                            timestamp: serverTimestamp()
                        };
                        
                        const orderRef = doc(collection(db, "orders"));
                        transaction.set(orderRef, orderData);
                    }
                });
                
                // تفريغ السلة
                cart = [];
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartBadge();
                closeCart();
                
                // تحديث بيانات المستخدم
                await loadUserData(auth.currentUser.uid);
                
                showToast('✅ تم إتمام الشراء بنجاح!', 'success');
                loadingScreen.classList.add('hidden');
                
            } catch (e) {
                loadingScreen.classList.add('hidden');
                showToast('❌ حدث خطأ: ' + e.message, 'error');
            }
        }

        function getProductById(id) {

        // ============================================================
        // RENDER FUNCTIONS
        // ============================================================
        
        function renderCategories() {
            const container = $('categoriesGrid');
            if (!container) return;
            
            container.innerHTML = categories.map(cat => `
                <div class="category-card" onclick="filterProducts('${cat.id}'); showPage('shop');">
                    <div class="icon">${cat.icon}</div>
                    <div class="name">${cat.name}</div>
                    <div class="count">${Object.values(productsData).filter(p => p.category === cat.id).length} منتج</div>
                </div>
            `).join('');
        }

        function renderProducts(productsArray, containerId, limit = 8) {
            const container = $(containerId);
            if (!container) return;
            
            const items = productsArray.slice(0, limit);
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gray-400);">
                        <i class="fas fa-box-open" style="font-size:3rem;display:block;margin-bottom:1rem;"></i>
                        <p>لا توجد منتجات</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = items.map(p => `
                <div class="product-card" onclick="showProductDetail('${p.id}')">

        function showPage(page) {
            currentPage = page;
            
            const pages = ['home', 'shop', 'about', 'contact', 'blog', 'account', 'settings'];
            pages.forEach(p => {
                const el = $(`page-${p}`);
                if (el) el.style.display = 'none';
            });
            
            const target = $(`page-${page}`);
            if (target) {
                target.style.display = 'block';
                if (page === 'shop') {
                    renderAllProducts();
                }
            }
            
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.classList.remove('active');
            });
            
            const linkMap = { 'home': 0, 'shop': 1, 'blog': 2, 'about': 3, 'contact': 4 };
            if (linkMap[page] !== undefined) {
                const links = document.querySelectorAll('.nav-links a');
                if (links[linkMap[page]]) {
                    links[linkMap[page]].classList.add('active');
                }
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateUIForUser(user) {
            const avatar = user?.img || 'https://via.placeholder.com/50';
            const name = user?.name || 'زائر';
            const walletId = user?.walletID ? `#${user.walletID}` : 'غير مسجل';
            const balance = user?.balance ? `${user.balance.toLocaleString()} ج.س` : '0 ج.س';
            
            // واجهة المحفظة
            const walletAvatar = $('walletAvatar');
            const walletName = $('walletName');
            const walletIdEl = $('walletId');
            const walletBalance = $('walletBalance');
            
            if (walletAvatar) walletAvatar.src = avatar;
            if (walletName) walletName.textContent = name;
            if (walletIdEl) walletIdEl.textContent = `رقم المحفظة: ${walletId}`;
            if (walletBalance) walletBalance.textContent = balance;
            
            // صفحة الحساب
            const accountAvatar = $('accountAvatar');
            const accountName = $('accountName');
            const accountEmail = $('accountEmail');
            const accountBalance = $('accountBalance');
            
            if (accountAvatar) accountAvatar.src = avatar;
            if (accountName) accountName.textContent = name;
            if (accountEmail) accountEmail.textContent = user?.email || 'guest@morrestore.com';
            if (accountBalance) accountBalance.textContent = balance;
            
            // إعدادات            const settingsAvatar = $('settingsAvatar');
            const settingsName = $('settingsName');
            const settingsEmail = $('settingsEmail');
            const settingsPhone = $('settingsPhone');
            
            if (settingsAvatar) settingsAvatar.src = avatar;
            if (settingsName) settingsName.value = name;
            if (settingsEmail) settingsEmail.value = user?.email || 'guest@morrestore.com';
            if (settingsPhone) settingsPhone.value = user?.phone || '';
            
            // أزرار تسجيل الدخول/الخروج
            const accountLoginBtn = $('accountLoginBtn');
            const accountLogoutBtn = $('accountLogoutBtn');
            const logoutBtn = $('logoutBtn');
            
            if (user) {
                if (accountLoginBtn) accountLoginBtn.style.display = 'none';
                if (accountLogoutBtn) accountLogoutBtn.style.display = 'block';
                if (logoutBtn) logoutBtn.style.display = 'block';
            } else {
                if (accountLoginBtn) accountLoginBtn.style.display = 'block';
                if (accountLogoutBtn) accountLogoutBtn.style.display = 'none';
                if (logoutBtn) logoutBtn.style.display = 'none';
            }
        }

        async function loadUserData(uid) {
            try {
                const userDoc = await getDoc(doc(db, "users", uid));
                if (userDoc.exists()) {
                    userData = userDoc.data();
                    userData.uid = uid;
                    updateUIForUser(userData);
                    loadUserOrders(uid);
                    return userData;
                }
                return null;
            } catch (e) {
                console.error('Error loading user data:', e);
                return null;

        async function loadAdminStats() {
            try {
                const usersSnap = await getDocs(collection(db, "users"));
                const totalUsers = usersSnap.size;
                
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const todayOrders = await getDocs(query(collection(db, "orders"), where("timestamp", ">=", today)));
                const todaySales = todayOrders.docs.reduce((sum, doc) => sum + (doc.data().price || 0), 0);
                
                const pendingSnap = await getDocs(query(collection(db, "orders"), where("status", "==", "قيد الانتظار")));
                const pendingOrders = pendingSnap.size;
                
                const allOrders = await getDocs(collection(db, "orders"));
                const totalOrders = allOrders.size;
                const totalSales = allOrders.docs.reduce((sum, doc) => sum + (doc.data().price || 0), 0);
                
                // تحديث الـ UI
                const totalUsersEl = $('totalUsers');
                const todaySalesEl = $('todaySales');
                const pendingOrdersEl = $('pendingOrders');
                const totalOrdersEl = $('totalOrders');
                const totalSalesEl = $('totalSales');
                
                if (totalUsersEl) totalUsersEl.textContent = totalUsers;
                if (todaySalesEl) todaySalesEl.textContent = todaySales.toLocaleString();
                if (pendingOrdersEl) pendingOrdersEl.textContent = pendingOrders;
                if (totalOrdersEl) totalOrdersEl.textContent = totalOrders;
                if (totalSalesEl) totalSalesEl.textContent = totalSales.toLocaleString();
                
            } catch (e) {
                console.error('Error loading admin stats:', e);
            }
        }

        async function createCoupon() {
            const code = $('couponCode').value.toUpperCase();
            const discount = parseInt($('couponDiscount').value);
            const maxUses = parseInt($('couponMaxUses').value) || 999;
            const expiry = $('couponExpiry').value;
            
            if (!code || !discount || !expiry) {
                showToast('❌ جميع الحقول مطلوبة', 'error');
                return;
            }
            
            try {
                await setDoc(doc(db, "coupons", code), {
                    code: code,
                    discount: discount,
                    maxUses: maxUses,
                    usedCount: 0,
                    isActive: true,
                    expiryDate: new Date(expiry),
                    createdAt: serverTimestamp()
                });
                
                showToast('✅ تم إنشاء الكوبون بنجاح', 'success');
                $('couponCode').value = '';
                $('couponDiscount').value = '';
                $('couponMaxUses').value = '';
                $('couponExpiry').value = '';
            } catch (e) {
                showToast('❌ حدث خطأ: ' + e.message, 'error');
            }
        }

            if (!confirm('⚠️ هل أنت متأكد من حذف هذا الكوبون؟')) return;
            
            try {
                await deleteDoc(doc(db, "coupons", couponId));
                showToast('✅ تم حذف الكوبون', 'success');
            } catch (e) {
                showToast('❌ حدث خطأ: ' + e.message, 'error');

                    <p style="color:var(--gray-500);font-size:0.9rem;">آخر تحديث: يناير 2025</p>
                `
            },
            refund: {
                title: '💰 سياسة الاسترجاع',
                content: `
                    <h2 style="font-weight:700;margin-bottom:1rem;">سياسة الاسترجاع</h2>
                    <p style="color:var(--gray-600);line-height:1.8;">سياسة الاسترجاع في MORRE STORE:</p>
                    <ul style="list-style:disc;padding-right:1.5rem;margin:1rem 0;color:var(--gray-600);">
                        <li>في حال تأخر الشحن أكثر من 48 ساعة، يمكنك طلب استرجاع كامل</li>
                        <li>الاسترجاع يكون عبر محفظتك في الموقع</li>
                        <li>لا نسترد المبالغ بعد إتمام عملية الشحن</li>
                    </ul>
                    <p style="color:var(--gray-500);font-size:0.9rem;">آخر تحديث: يناير 2025</p>
                `
            }
        };

        function showPolicy(type) {
            const policy = policiesData[type] || policiesData.privacy;
            const titleEl = $('policyTitle');
            const contentEl = $('policyContent');
            const modal = $('policyModal');
            
            if (titleEl) titleEl.textContent = policy.title;
            if (contentEl) contentEl.innerHTML = policy.content;
            if (modal) modal.classList.add('active');
        }

        function closePolicy() {
            const modal = $('policyModal');
            if (modal) modal.classList.remove('active');
        }

        // ============================================================
        // CONTACT FORM
        // ============================================================
        
        function sendContactMessage(event) {
            event.preventDefault();
            const name = $('contactName').value.trim();
            const email = $('contactEmail').value.trim();
            const message = $('contactMessage').value.trim();
            
            if (!name || !email || !message) {
                showToast('❌ جميع الحقول مطلوبة', 'error');
                return;
            }
            
            const fullMessage = `📩 رسالة جديدة من ${name}\n📧 البريد: ${email}\n📝 الرسالة: ${message}`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(fullMessage)}`, '_blank');
            showToast('✅ تم إرسال رسالتك!', 'success');
            event.target.reset();
        }

        // ============================================================
        // AUTH STATE OBSERVER - حقيقي
        // ============================================================
        
        onAuthStateChanged(auth, async (user) => {
            const loading = $('loadingScreen');
            const authScr = $('authScreen');
            const appScr = $('mainApp');
            
            if (loading) loading.classList.remove('hidden');
            
            if (user) {
                // التحقق من الحظر
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().isBlocked) {
                    await signOut(auth);
                    showToast('⛔ تم حظر حسابك، تواصل مع الدعم', 'error');
                    if (authScr) authScr.classList.add('active');
                    if (appScr) appScr.style.display = 'none';
                    if (loading) loading.classList.add('hidden');
                    return;
                }
                
                // تحميل بيانات المستخدم
                await loadUserData(user.uid);
                
                // إظهار التطبيق
                if (authScr) authScr.classList.remove('active');
                if (appScr) appScr.style.display = 'block';
                
                // تحميل لوحة التحكم
                loadAdminPanel();
                
                // تحديث واجهة المستخدم
                if (userData) {
                    updateUIForUser(userData);
                }
                
                if (loading) loading.classList.add('hidden');
                
            } else {
                // مستخدم غير مسجل
                if (authScr) authScr.classList.add('active');
                if (appScr) appScr.style.display = 'none';
                if (loading) loading.classList.add('hidden');
                
                userData = null;
                updateUIForUser(null);
            }
        });

        // ============================================================
        // INIT
        // ============================================================
        
        document.addEventListener('DOMContentLoaded', function() {
            // تطبيق الثيم
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark');
                const icon = $('themeIcon');
                if (icon) icon.className = 'fas fa-sun';
            }
            
            // عرض التصنيفات والمنتجات
            renderCategories();
            renderProducts(Object.values(productsData), 'featuredProducts', 8);
            renderProducts(getTopProducts(4), 'topProducts', 4);
            
            // تحديث السلة
            updateCartBadge();
            
            // مراقبة التمرير
            window.addEventListener('scroll', function() {
                const btn = $('scrollTopBtn');
                if (btn) {
                    if (window.scrollY > 300) {
                        btn.classList.add('visible');
                    } else {
                        btn.classList.remove('visible');
                    }
                }
            });
            
            console.log('🚀 MORRE STORE - نظام حقيقي مع Firebase!');
            console.log('📦 عدد المنتجات:', Object.keys(productsData).length);
            console.log('📂 عدد التصنيفات:', categories.length);
        });

        // ============================================================
        // EXPOSE FUNCTIONS
        // ============================================================
        
        window.showPage = showPage;
        window.showProductDetail = showProductDetail;
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.showCart = showCart;
        window.closeCart = closeCart;
        window.updateCartQuantity = updateCartQuantity;
        window.buyNow = buyNow;
        window.checkout = checkout;
        window.filterProducts = filterProducts;
        window.showAuthScreen = showAuthScreen;
        window.hideAuthScreen = hideAuthScreen;
        window.switchAuthTab = switchAuthTab;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.handleGoogleLogin = handleGoogleLogin;
        window.forgotPassword = forgotPassword;
        window.handleLogout = handleLogout;
        window.rechargeWallet = rechargeWallet;
        window.saveSettings = saveSettings;
        window.toggleTheme = toggleTheme;
        window.showPolicy = showPolicy;
        window.closePolicy = closePolicy;
        window.showToast = showToast;
        window.toggleMobileMenu = toggleMobileMenu;
        window.sendContactMessage = sendContactMessage;
        window.createCoupon = createCoupon;
        window.deleteCoupon = deleteCoupon;
        window.updateOrderStatus = updateOrderStatus;
    </script>
</body>
</html>
